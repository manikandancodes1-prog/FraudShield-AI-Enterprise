version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Mani12345 
      POSTGRES_DB: fraudshield
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:Mani12345@db:5432/fraudshield

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend